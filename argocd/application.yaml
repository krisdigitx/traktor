apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-order-alerts
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/krisdigitx/ecommerce-order-alerts.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: traktor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
